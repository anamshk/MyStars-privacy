<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Stars - App Information</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4A90E2 0%, #357ABD 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #1F2123;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 40px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-button {
            background: linear-gradient(135deg, #4A90E2 0%, #357ABD 100%);
            color: white;
            text-decoration: none;
            padding: 20px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            display: block;
        }

        .link-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(74, 144, 226, 0.4);
        }

        .link-button.secondary {
            background: #F8F9FA;
            color: #4A90E2;
            border: 2px solid #4A90E2;
        }

        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #E9ECEF;
            color: #6C757D;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⭐ My Stars</h1>
        <p class="subtitle">Task Tracker for Children</p>

        <div class="links">
            <a href="support.html" class="link-button">
                📧 Support & Help
            </a>
            <a href="privacy.html" class="link-button secondary">
                🛡️ Privacy Policy
            </a>
        </div>

        <footer>
            <p>My Stars - Task Tracker</p>
            <p>© 2026 My Stars. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
